<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Epidemius</title>
</head>

<body>
    <div class="container-fluid p-0" style="background-color: #e0e0ff; color: #000">
        <h1 class="mx-3 pt-2">Epidemius</h1>
        <p class="mx-3">Calculadora epidêmica baseada no modelo compartimental SEIR. Resolução a partir do método de Runge-Kutta de 4ª ordem.</p>
        <hr style="width: 100%" />
    </div>

    <div class="container">
        <div class="row">
            <label class="form-label mt-4">Tamanho populacional:</label>
            <input type="text" class="form-control input-positive-int" id="n" inputmode="decimal" autofocus />
        </div>

        <div class="row">
            <label class="form-label mt-2">Número inicial de infectados:</label>
            <input type="text" class="form-control input-positive-int" id="io" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Número reprodutivo básico (de 0 a 10):</label>
            <input type="text" class="form-control input-positive-float input-apply-bounds" id="r0" min="0" max="10" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Redução percentual na transmissão (de 0 a 1):</label>
            <input type="text" class="form-control input-positive-float input-apply-bounds" id="theta" min="0" max="1" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Taxa de mortalidade (de 0 a 100%):</label>
            <input type="text" class="form-control input-positive-float input-apply-bounds" id="delta" min="0" max="100" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Taxa de internamento (de 0 a 100%):</label>
            <input type="text" class="form-control input-positive-float input-apply-bounds" id="tau" min="0" max="100" inputmode="decimal" />
        </div>

        <div class="row mt-3 mb-1">
            <hr />
        </div>

        <div class="row">
            <label class="form-label mt-3">Tempo (em dias) em que o paciente está infectado:</label>
            <input type="text" class="form-control input-positive-int input-apply-bounds" id="tinf" min="1" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Tempo (em dias) de incubação:</label>
            <input type="text" class="form-control input-positive-int input-apply-bounds" id="tinc" min="1" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Tempo (em dias) do final do período de incubação até o falecimento:</label>
            <input type="text" class="form-control input-positive-int" id="tm" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Tempo (em dias) de internamento hospitalar:</label>
            <input type="text" class="form-control input-positive-int" id="tint" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Tempo (em dias) de recuperação para casos leves:</label>
            <input type="text" class="form-control input-positive-int" id="trec" inputmode="decimal" />
        </div>

        <div class="row">
            <label class="form-label mt-2">Tempo (em dias) decorrido até a hospitalização:</label>
            <input type="text" class="form-control input-positive-int" id="thosp" inputmode="decimal" />
        </div>

        <div class="row mt-3 mb-1">
            <hr />
        </div>

        <div class="row">
            <label class="form-label mt-3">Tempo de simulação (dias):</label>
            <input type="text" class="form-control input-positive-int" id="ts" inputmode="decimal" />
        </div>

        <div class="alert alert-warning mt-4" id="evaluate-alert" role="alert" style="display: none">
        </div>

        <div class="row mt-4">
            <button class="btn mb-5" id="evaluate-button" style="background-color: #e0e0ff; color: #000">Processar dados</button>
        </div>
    </div>

    <div class="container" id="chart-container">
        <canvas id="chart" style="display: none"></canvas>
    </div>

    <div class="container">
        <table class="table mt-5" id="results-table" style="display: none">
            <thead>
                <tr>
                    <th scope="col">Dia</th>
                    <th scope="col">Suscetíveis</th>
                    <th scope="col">Expostos</th>
                    <th scope="col">Infectados</th>
                    <th scope="col">Recuperados</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>

    <div class="modal fade" id="incorrect-data-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Erro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <p>Por gentileza, informe os dados corretamente.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" data-bs-dismiss="modal" style="background-color: #e0e0ff; color: #000">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

    <script src="validation.js" defer></script>
    <script src="seir.js" defer></script>
    <script src="table.js" defer></script>
    <script src="chart.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
